services:
  meteor-mcp:
    build: .
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.create_connection(('localhost', 8080), timeout=5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
